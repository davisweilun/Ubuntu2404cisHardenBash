# =============================================================================
# CIS Ubuntu 24.04 v2.0.0 — Tunable Variables (sourced by harden.sh)
# =============================================================================
# Every environment-specific value and per-control toggle lives here.
# Ported from the Ansible project's defaults/main.yml.
# Values: true / false (lowercase). Edit this file, not the section scripts.
# =============================================================================

# -----------------------------------------------------------------------------
# Global controls
# -----------------------------------------------------------------------------
# Master switch for disruptive controls (reboot / kernel-module unload).
# Can also be enabled per-run with:  sudo ./harden.sh --deferred
CIS_RUN_DEFERRED=false
# Apply Level 2 controls in addition to Level 1.
CIS_LEVEL2_ENABLED=true
# Does this host run a graphical desktop (GDM)? Controls 1.7.x only apply when
# true — and they self-skip anyway if dconf/GDM is not installed.
CIS_HOST_HAS_GUI=true

# -----------------------------------------------------------------------------
# Section 1 — Initial Setup
# -----------------------------------------------------------------------------
# 1.1.1.x — Unused kernel filesystem/storage modules (blacklist + disable load).
CIS_1_1_1_1_ENABLED=true    # cramfs        (L1)
CIS_1_1_1_2_ENABLED=true    # freevxfs      (L1)
CIS_1_1_1_3_ENABLED=true    # hfs           (L1)
CIS_1_1_1_4_ENABLED=true    # hfsplus       (L1)
CIS_1_1_1_5_ENABLED=true    # jffs2         (L1)
CIS_1_1_1_7_ENABLED=true    # squashfs      (L2)  [CONTAINER-RISK] snapd uses squashfs
CIS_1_1_1_8_ENABLED=true    # udf           (L2)
CIS_1_1_1_9_ENABLED=true    # firewire-core (L1)

# 1.1.1.6 overlay — OFF by default: overlay is required by Docker/containerd/
# Kubernetes and snapd. Enabling will break container runtimes. [CONTAINER-RISK]
CIS_1_1_1_6_OVERLAY_DISABLE=false
# 1.1.1.10 usb-storage — deferred (needs reboot to fully unload). [REBOOT-REQUIRED]
CIS_1_1_1_10_ENABLED=true

# 1.1.2.x — Mount options (separate-partition creation is out of scope).
CIS_1_1_2_MANAGE_MOUNT_OPTS=true
CIS_DEV_SHM_MOUNT_OPTS="defaults,rw,nosuid,nodev,noexec,relatime"
CIS_TMP_MOUNT_OPTS="defaults,rw,nosuid,nodev,noexec,relatime"

# 1.2.x — APT / package management
CIS_1_2_1_2_DISABLE_WEAK_DEPS=true   # APT::Install-Recommends/Suggests "false" (L2)

# 1.3.x — AppArmor
CIS_1_3_APPARMOR_ENABLED=true
CIS_1_3_1_3_ENFORCE_PROFILES=false   # L2: enforce ALL profiles. [K8S-RISK][CONTAINER-RISK]
CIS_1_3_1_4_RESTRICT_UNPRIVILEGED=true  # kernel.apparmor_restrict_unprivileged_unconfined=1

# 1.5.x — Kernel / process hardening
CIS_1_5_5_DMESG_RESTRICT=true        # kernel.dmesg_restrict = 1
CIS_1_5_6_PRELINK_REMOVE=true        # prelink must not be installed
CIS_1_5_7_DISABLE_APPORT=true        # disable Automatic Error Reporting

# 1.6.x — Warning banners (issue, issue.net + the sshd Banner file).
# /etc/motd is REMOVED (backed up): the benchmark passes with the file absent,
# and the scanner rejects it even with correct content and permissions.
CIS_1_6_MANAGE_BANNERS=true
CIS_1_6_BANNER_TEXT="Authorized uses only. All activity may be monitored and reported."
# 1.6.1/1.6.4 — Ubuntu's dynamic MOTD scripts (/etc/update-motd.d/*) print OS
# and patch info at login, which the benchmark treats as an information leak.
# true = remove (with backup) the scripts whose content names the OS, and
# strip the execute bit from the rest (login banner goes quiet).
CIS_1_6_DISABLE_DYNAMIC_MOTD=true

# 1.7.x — GDM (only applied when CIS_HOST_HAS_GUI=true and dconf is present)
CIS_1_7_MANAGE_GDM=true
CIS_1_7_SCREENSAVER_LOCK_DELAY=5     # seconds idle before lock activates
CIS_1_7_SCREENSAVER_IDLE_DELAY=900   # seconds idle before screensaver (<=900)

# -----------------------------------------------------------------------------
# Section 2 — Services
# -----------------------------------------------------------------------------
# Set a flag to false to KEEP a service/client the host legitimately uses.
CIS_2_1_3_REMOVE_AVAHI=true          # [GUI-RISK] desktop/printer mDNS discovery
CIS_2_1_14_REMOVE_CUPS=true          # [GUI-RISK] local printing
CIS_2_2_4_REMOVE_TELNET_CLIENT=true
CIS_2_2_5_REMOVE_LDAP_CLIENT=true    # [AD-RISK] keep if admins run ldapsearch against AD
CIS_2_2_6_REMOVE_FTP_CLIENT=true
# 2.3.2.1 — authorized NTP servers for systemd-timesyncd.
# *** PLACEHOLDER — set your real NTP server(s), space-separated, or set
# CIS_2_3_MANAGE_TIMESYNCD=false if chrony/other already handles time. ***
CIS_2_3_MANAGE_TIMESYNCD=true
CIS_2_3_NTP_SERVERS="ntp1.example.org ntp2.example.org"
CIS_2_3_NTP_FALLBACK="ntp.ubuntu.com"
# 2.4.1.9 — restrict `crontab` to listed users via /etc/cron.allow.
# Users NOT listed lose the ability to edit their crontabs (root always can).
CIS_2_4_1_9_MANAGE_CRON_ALLOW=true
CIS_2_4_CRON_ALLOW_USERS="root"

# -----------------------------------------------------------------------------
# Section 3 — Network
# -----------------------------------------------------------------------------
CIS_3_1_3_DISABLE_BLUETOOTH=true     # [GUI-RISK] keep on laptops/workstations
# 3.3.1.x — IP forwarding is left ENABLED by default: [K8S-RISK][CONTAINER-RISK]
# routers, Docker and Kubernetes REQUIRE forwarding=1. Controls 3.3.1.1/2/3 stay
# non-compliant by choice. Set true ONLY on hosts that are definitely not
# routers or container/k8s nodes.
CIS_3_3_DISABLE_IP_FORWARDING=false
CIS_3_3_MANAGE_IPV6=true             # apply IPv6 hardening sysctls (3.3.2.x)
# 3.3.1.12/13 — strict reverse-path filtering (rp_filter=1). [K8S-RISK] some
# CNIs (notably Calico) require loose rp_filter — set false on those nodes.
CIS_3_3_RP_FILTER_STRICT=true

# -----------------------------------------------------------------------------
# Section 4 — Host-Based Firewall (ufw)
# -----------------------------------------------------------------------------
# DISABLED BY DEFAULT. In many environments the host firewall is owned by a
# separate/third-party product; ufw alongside it causes conflicting iptables
# rules. Set true ONLY where ufw is the intended host firewall. When enabled,
# an SSH allow rule is ALWAYS added before deny-by-default. [LOCKOUT-RISK]
CIS_4_MANAGE_UFW=false
CIS_4_SSH_PORT=22                    # MUST match sshd's port
CIS_4_1_4_OUTGOING_DENY=false        # L2: deny-by-default outbound. High breakage risk.

# -----------------------------------------------------------------------------
# Section 5 — Access, Authentication & Authorization
# -----------------------------------------------------------------------------
# 5.1.x sshd — written to /etc/ssh/sshd_config.d/60-cis.conf (drop-in).
CIS_5_1_7_CLIENTALIVEINTERVAL=15
CIS_5_1_7_CLIENTALIVECOUNTMAX=3
CIS_5_1_8_DISABLEFORWARDING=true     # L2; breaks SSH port/X forwarding if used
CIS_5_1_16_MAXAUTHTRIES=4
CIS_5_1_PERMITROOTLOGIN="no"         # [AD-RISK] ensure a non-root sudo account first
CIS_5_1_MACS="hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
CIS_5_1_5_BANNER="/etc/issue.net"    # 5.1.5 sshd Banner file (written by 1.6.3)
CIS_5_1_13_LOGINGRACETIME=60         # 5.1.13 seconds to authenticate
CIS_5_1_17_MAXSTARTUPS="10:30:60"    # 5.1.17 unauthenticated connection throttle
# 5.2.x sudo / su
CIS_5_2_3_SUDO_LOGFILE="/var/log/sudo.log"  # 5.2.3 sudo log file
CIS_5_2_4_REQUIRE_PASSWORD=true      # L2: strip NOPASSWD from sudoers
CIS_5_2_7_SU_GROUP="sugroup"         # empty group gating access to `su` (pam_wheel)
# 5.3.3.x password quality / lockout
CIS_5_3_FAILLOCK_DENY=5
CIS_5_3_FAILLOCK_UNLOCK_TIME=900
CIS_5_3_FAILLOCK_EVEN_DENY_ROOT=true # 5.3.3.1.3 (L2)
CIS_5_3_PWQUALITY_MINLEN=14
CIS_5_3_PWQUALITY_DIFOK=2
CIS_5_3_PWQUALITY_MAXREPEAT=3
CIS_5_3_PWQUALITY_MAXSEQUENCE=3
CIS_5_3_PWHISTORY_REMEMBER=24
# PAM module enablement via pam-auth-update profiles (files/pam-configs/*).
# AD/SSSD-safe: pam-auth-update merges these with the sss profile from
# `realm join`. [AD-RISK] still validate on a test AD host first.
CIS_5_3_MANAGE_PAM=true
# 5.4.x account policy
CIS_5_4_PASS_MAX_DAYS=365
CIS_5_4_PASS_WARN_AGE=7
CIS_5_4_INACTIVE_LOCK_DAYS=30        # 5.4.1.5
CIS_5_4_SHELL_TIMEOUT=900            # 5.4.3.2 TMOUT
CIS_5_4_DEFAULT_UMASK="027"          # 5.4.3.3 (also written to login.defs UMASK)
# 5.4.1.1/5.4.1.5 — login.defs/useradd only govern NEW accounts; the audit also
# checks EXISTING users. true = apply chage --maxdays/--inactive to every
# account that has a real password hash. [AD-RISK] local accounts only.
CIS_5_4_APPLY_TO_EXISTING_USERS=true

# -----------------------------------------------------------------------------
# Section 6 — Logging & Auditing
# -----------------------------------------------------------------------------
CIS_6_1_JOURNALD_STORAGE="persistent"   # 6.1.1.1.6
CIS_6_1_MANAGE_RSYSLOG_TLS=false        # 6.1.2.8/9 (L2) needs remote loghost + CA
CIS_6_2_MANAGE_AUDITD=true              # install + rules (L2)
CIS_6_2_AUDIT_IMMUTABLE=false           # 6.2.3.29: -e 2 needs REBOOT to clear
CIS_6_2_DISK_FULL_ACTION="halt"         # 6.2.2.3 (use "single" for less drastic)
CIS_6_2_SPACE_LEFT_ACTION="email"       # 6.2.2.4
CIS_6_2_DISK_ERROR_ACTION="halt"        # 6.2.2.3 also audits disk_error_action
# 6.2.1.3/6.2.1.4 — audit processes before auditd starts: adds audit=1 and
# audit_backlog_limit to GRUB_CMDLINE_LINUX. [REBOOT-REQUIRED] for effect
# (the scanner checks grub.cfg, which updates immediately via update-grub).
CIS_6_2_GRUB_AUDIT=true
CIS_6_2_BACKLOG_LIMIT=8192
# 6.3.x — AIDE file integrity monitoring
CIS_6_3_MANAGE_AIDE=true
# First database build (aideinit) can take several minutes on large filesystems.
CIS_6_3_INIT_DB=true

# -----------------------------------------------------------------------------
# Section 7 — System Maintenance
# -----------------------------------------------------------------------------
CIS_7_1_11_FIX_WORLD_WRITABLE=true   # strip o+w (adds sticky bit to dirs)
CIS_7_2_10_FIX_USER_DOTFILES=true    # tighten perms on interactive users' dotfiles

# Path prefixes excluded from the recursive 7.1.11/7.1.12 filesystem sweeps.
# [K8S-RISK][CONTAINER-RISK] container/k8s storage holds files whose permissions
# are managed by the runtime — stripping o+w can corrupt images/volumes. These
# dirs don't exist on a normal host (excluding them is harmless there).
CIS_7_FS_SCAN_EXCLUDES=(
    /proc
    /sys
    /var/lib/docker        # Docker overlay2 layer storage
    /var/lib/containerd    # containerd snapshots/layers
    /var/lib/kubelet       # pod volumes (emptyDir, projected, etc.)
    /var/lib/rancher       # RKE2 / k3s
    /var/lib/etcd          # etcd data
    /var/lib/cni           # CNI state
    /run/containerd
    /run/k3s
    /opt/cni
    /etc/cni
)
